<html>
    <head>
        <meta charset = "utf-8"/> 
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"> 
        <script type="text/javascript" src="https://maps.google.com/maps/api/js?sensor=false">
        </script>
    </head>
    <body>
	<script = "text/javacript">
		var markerIcon = new google.maps.MarkerImage("images/marker.jpg");
 
		function MyPos()
		{
		    if(navigator.geolocation)
		    {
			navigator.geolocation.getCurrentPosition(CurPosition, ErrorCallback);
		    }
		}
        function CurPosition(position) {
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;
        var accuracy = position.coords.accuracy; // 정확도 정보 추가

        document.getElementById("result").innerHTML = "위도: " + lat + " / 경도: " + lng;

        var latlng = new google.maps.LatLng(lat, lng);
        var options = {
        zoom: 17, // 줌 레벨을 조금 더 확대 (15 -> 17)
        center: latlng,
        mapTypeId: google.maps.MapTypeId.ROADMAP
        };

        var map = new google.maps.Map(document.getElementById("map"), options);

        // 1. 통통 튀는 애니메이션 마커 추가
        var marker = new google.maps.Marker({
        map: map,
        position: latlng,
        title: "현재 위치",
        animation: google.maps.Animation.BOUNCE, // 마커가 통통 튑니다!
        icon: markerIcon
        });

        // 2. 마커 위에 말풍선(InfoWindow) 추가
        var infowindow = new google.maps.InfoWindow({
        content: '<div style="padding:5px;"><b>당신의 현재 위치</b></div>'
        });
        infowindow.open(map, marker);

        // 3. 현재 위치 주변에 정확도 원 그리기 (모바일 지도 느낌)
        var cityCircle = new google.maps.Circle({
        strokeColor: "#1E90FF",
        strokeOpacity: 0.8,
        strokeWeight: 2,
        fillColor: "#1E90FF",
        fillOpacity: 0.35,
        map: map,
        center: latlng,
        radius: accuracy // 정확도(미터 단위)만큼 원을 그립니다.
        });
        }
		function ErrorCallback(error)
		{
			switch(error.code)
			{
				case error.PERMISSION_DENIED:
					document.getElementById("result").innerHTML = "현재 위치 정보에 대한 권한이 없습니다";break;
				case error.POSITION_UNAVAILABLE:
					document.getElementById("result").innerHTML = "현재 위치 정보를 구할 수 없습니다";break;
				case error.TIMEOUT:
					document.getElementById("result").innerHTML = "시간 제한을 초과했습니다.";break;
			}
		}
        </script>
        <button onclick="MyPos()" type="button">현재 나의 위치</button><p>
        <div id = "result"></div>    
	<div id="map" style="width: 500px; height: 500px"></div>
    </body>
</html>
