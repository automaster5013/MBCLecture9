<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
    </head>
    <body>
        <script type="text/javascript">
            var person = new Object();
            var person2 = "Simon";
            alert(person instanceof Object);    // person 변수가 object의 instance인지?
            alert(person2 instanceof Object);   // person2 변수가 object의 instance인지?
            alert(typeof person);
            alert(typeof person2);
        </script>
    </body>
</html>
