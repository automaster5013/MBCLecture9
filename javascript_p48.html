<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
    </head>
    <body>
        <script type="text/javascript">
        function displayInfo(args) {
            var output = "";

            if(typeof args.name == "string") {
                output += "Name : " + args.name + "\n";
            }
            if(typeof args.age == "number") {
                output += "Age : " + args.age + "\n";
            }
            alert(output);
            alert(args.age);
        }

        displayInfo({
            name: "Nicholas", 
            age: 29
        });
        displayInfo({
            name: "Greg" 
        });
        </script>
    </body>
</html>
