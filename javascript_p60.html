<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
    </head>
    <body>
    <script type="text/javascript">
    var stringValue = "Lorem ipsum dolor sit amet, consectetur adipiscing elit";
    var positions = new Array();
    var pos = stringValue.indexOf("e");

    while(pos > -1) {
        positions.push(pos);
        pos = stringValue.indexOf("e", pos + 1);
    }

    alert(positions);
    </script>
    </body>
</html>
