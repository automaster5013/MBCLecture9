<!DOCTYPE html>
<html>
    <body>
        <img id="image" src="images/drum_01.jpg" width="120" height="100">
        <script>
        function changeImage() {
            var img = document.getElementById("image");
            if (img.src.match("drum_01")) {
                img.src = "images/drum_02.jpg";
            } else {
                img.src = "images/drum_01.jpg";
            }
        }
        </script>
            <input type="button" onclick="changeImage()" value="click!"/>
    </body>
</html>
