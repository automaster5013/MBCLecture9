<!DOCTYPE html>
<html>
    <body>
        <img id="image" src="images/drum_01.jpg" width="120" height="100">
        <script>
        status = 1
        function changeImage() {
            if (status == 1) {
            document.getElementById("image").src = "images/drum_01.jpg";
            status = 2
            } else {
                document.getElementById("image").src = "images/drum_02.jpg";
            status = 1
            }
        }
        </script>
            <input type="button" onclick="changeImage()" value="click!"/>
    </body>
</html>
