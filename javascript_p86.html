<html>
    <head>
        <meta charset="utf-8"/>
        <script>
        function checkLength(elem, min, max) {
            var s = elem.value;
            if(s.length >= min && s.length <= max) {
                alert(s);
                return true;
            }else{
                alert(min + "문자와 " + max + "문자 사이로 입력해 주세요!");
                elem.focus();
                return false;
            }
        }
        </script>
    </head>
    <body>
        <form>
            name(6~8 characters) : <input type="text" id="name" />
            <input type="button" onclick="checkLength(document.getElementById('name'), 6, 8)" 
            value='OK' />
        </form>
    </body>
</html>
